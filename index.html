<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتاب حبنا ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="book-container">
        <div class="book">
            <!-- الغلاف -->
            <div class="page cover-page">
                <div class="cover-content">
                    <h1>كتاب حبنا</h1>
                    <h2>لـ [اسم حبيبتك]</h2>
                    <p>من قلبي إليكِ ❤️</p>
                </div>
            </div>

            <!-- الصفحات -->
            <div class="page">
                <div class="page-content">
                    <img src="https://via.placeholder.com/300x400/FF69B4/FFFFFF?text=1-يناير" alt="اليوم الأول">
                    <div class="day-content">
                        <h3>1 يناير 2024</h3>
                        <p>اليوم اللي قابلتك فيه أول مرة... قلبي وقف!</p>
                    </div>
                </div>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://via.placeholder.com/300x400/FF1493/FFFFFF?text=14-فبراير" alt="عيد الحب">
                    <div class="day-content">
                        <h3>14 فبراير 2024</h3>
                        <p>عيد الحب معاكي أحلى حاجة في الدنيا ❤️</p>
                    </div>
                </div>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://via.placeholder.com/300x400/FFB6C1/000000?text=اليوم+الثالث" alt="اليوم الثالث">
                    <div class="day-content">
                        <h3>اليوم الثالث</h3>
                        <p>كل يوم معاكي قصة حب جديدة...</p>
                    </div>
                </div>
            </div>

            <!-- صفحة أخيرة -->
            <div class="page last-page">
                <div class="page-content">
                    <h2>وإلى الأبد معاً ❤️</h2>
                    <p>أحبك أكتر من الكلام</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="pageFlipSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/book/page-flip-1.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
