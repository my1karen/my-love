<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ كتاب حبنا ❤️</title><style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  overflow:hidden;
}

.book{
  width:90vw;
  max-width:360px;
  height:75vh;
  max-height:500px;
  perspective:2500px;
  position:relative;
}

.page{
  width:100%;
  height:100%;
  position:absolute;
  background:white;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
  transform-origin:left;
  transition:0.5s;
  backface-visibility:hidden;
  padding:15px;
  box-sizing:border-box;
}

.page img{
  width:100%;
  height:60%;
  object-fit:cover;
  border-radius:10px;
}

.page h2{
  text-align:center;
  font-size:18px;
  margin:10px 0;
}

.page p{
  text-align:center;
  font-size:14px;
}

.cover{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#ff4d6d;
  color:white;
  font-size:20px;
}

.heart{
  position:absolute;
  color:#ff4d6d;
  font-size:18px;
  animation:float 4s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-100px);opacity:0}
}

</style></head><body><div class="book" id="book">  <div class="page cover">
    <h2>❤️ ليكي انتي ❤️</h2>
  </div>  <div class="page">
    <h2>البداية ❤️</h2>
    <img src="img1.jpg">
  </div>  <div class="page">
    <h2>يوم جميل 🌹</h2>
    <img src="img2.jpg">
  </div>  <div class="page">
    <h2>بحبك 💕</h2>
    <img src="img3.jpg">
  </div></div><audio id="flipSound" src="flip.mp3"></audio>

<script>
let current = 0;
const pages = document.querySelectorAll('.page');
const sound = document.getElementById('flipSound');
let startX = 0;
let isDragging = false;

function updatePages(){
  pages.forEach((page,i)=>{
    if(i < current){
      page.style.transform = 'rotateY(-180deg)';
    } else {
      page.style.transform = 'rotateY(0deg)';
    }
  });
}

const book = document.getElementById('book');

book.addEventListener('touchstart', (e)=>{
  startX = e.touches[0].clientX;
  isDragging = true;
});

book.addEventListener('touchmove', (e)=>{
  if(!isDragging) return;

  let currentX = e.touches[0].clientX;
  let diff = startX - currentX;
  let rotate = diff / 2;

  if(current < pages.length){
    let page = pages[current];
    page.style.transition = '0s';
    page.style.transform = `rotateY(${-rotate}deg)`;
    page.style.boxShadow = `${-rotate}px 10px 30px rgba(0,0,0,0.7)`;
  }
});

book.addEventListener('touchend', (e)=>{
  isDragging = false;

  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(diff > 80 && current < pages.length){
    current++;
    sound.play();
    vibrate();
    createHeart();
  }

  if(diff < -80 && current > 0){
    current--;
    sound.play();
    vibrate();
  }

  pages.forEach(p => p.style.transition = '0.5s');
  updatePages();
});

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(30);
  }
}

function createHeart(){
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '❤️';
  heart.style.left = Math.random()*100 + '%';
  heart.style.top = '80%';
  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },4000);
}

updatePages();
</script></body>
</html>
